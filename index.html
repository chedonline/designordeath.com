<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Design or Death — a design reflex game</title>
  <meta name="description" content="WarioWare for design. Fix the kerning, tap the hierarchy, spot the misalignment — before the timer runs out. Design or death.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💀</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===================== HOME ===================== -->
  <section id="screen-home" class="screen">
    <div class="home-inner">
      <h1 class="wordmark">DESIGN<br><span class="wm-or">or</span> <span class="wm-death">DEATH</span></h1>
      <p class="tagline">A design reflex game. One instinct, five seconds, no mercy.</p>
      <button id="btn-play" class="btn btn-primary">Play</button>
      <p class="home-best">Best <span id="home-best">0</span></p>
      <p class="home-how">Fix the design before the bar runs out. Three misses and you're dead.</p>
    </div>
    <button id="btn-mute" class="mute" aria-label="Toggle sound">♪</button>
  </section>

  <!-- ===================== PLAY ===================== -->
  <section id="screen-play" class="screen hidden">
    <header class="hud">
      <div id="hearts" class="hearts"></div>
      <div class="hud-right">
        <span id="combo" class="combo"></span>
        <span id="score" class="score">0</span>
      </div>
    </header>

    <div class="arena">
      <div id="flash" class="flash"></div>
      <div id="stage" class="stage"></div>
      <div id="command" class="command"></div>
    </div>

    <div class="countdown"><div id="bar" class="bar"></div></div>
  </section>

  <!-- ===================== GAME OVER ===================== -->
  <section id="screen-over" class="screen hidden">
    <div class="home-inner">
      <h1 class="wordmark small"><span class="wm-death">DEAD.</span></h1>
      <p class="over-score">Score <strong id="final-score">0</strong></p>
      <p class="over-best">Best <span id="final-best">0</span></p>
      <button id="btn-again" class="btn btn-primary">Play again</button>
      <button id="btn-home" class="btn btn-ghost">Home</button>
    </div>
  </section>

  <script src="data/content.js"></script>
  <script src="js/microgames.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
